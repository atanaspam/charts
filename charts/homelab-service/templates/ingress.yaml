{{- if .Values.ingress.create }}

apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "service.name" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    external-dns.alpha.kubernetes.io/target: {{ $ }}
    kubernetes.io/ingress.class: traefik
  labels:
    {{- include "service.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    {{- range .Values.ingress.routes }}
  - kind: Rule
    match: {{ .match }}
    {{ if .middlewares }}
    middlewares:
      {{ range .middlewares }}
      - name: {{ .name }}
      {{- end }}
    {{- end }}
    services:
    - kind: Service
      name: asd #{{ include "service.name" . }}
      namespace: {{ .Release.Namespace }}
      passHostHeader: true
      {{- range $port := .Values.service.ports }}
        {{- if eq $port.name "http" }}
      port: {{ $port.port }}
        {{- end }}
      {{- end }}
    {{- end }}
  tls:
    secretName: {{ include "service.name" . }}-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "service.name" . }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ include "service.name" . }}-cert
  issuerRef:
    name: {{ .Values.ingress.issuer.name }}
    kind: ClusterIssuer
  dnsNames:
  - {{  printf "%s.%s" (include "service.name" .) (include "service.url.fqdn") }}
  {{- if .Values.ingress.internalEndpoint -}}
  - {{ .Values.ingress.route.match.internalEndpoint }}
  {{ end }}
  {{- if .Values.ingress.publicEndpoint -}}
  - {{ .Values.ingress.route.match.publicEndpoint }}
  {{ end }}
{{- end }}
# Custom middlewares should be defined in the Traefik helm chart not in the service chart
# {{- range .Values.ingress.customMiddlewares.definitions }}
# ---
# {{ include "service.render" (dict "value" . "context" $) }}
# {{- end }}
